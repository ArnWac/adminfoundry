<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }} — Sign in</title>
  <link rel="stylesheet" href="{{ admin_ui_path }}/static/admin.css">
</head>
<body data-view="login">
  <main class="login">
    <h1>{{ admin_title }}</h1>
    <form id="login-form" novalidate autocomplete="on">
      <p id="login-error" class="form-error" role="alert" aria-live="polite" hidden></p>
      <label>
        Email
        <input type="email" name="email" required autofocus autocomplete="email">
      </label>
      <label>
        Password
        <input type="password" name="password" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary">Sign in</button>
    </form>
  </main>

  <script>
    window.ADMINFOUNDRY = {
      uiPath: {{ admin_ui_path | tojson }},
      authPrefix: {{ auth_api_prefix | tojson }},
      adminPrefix: {{ admin_api_prefix | tojson }},
      view: "login",
    };
  </script>
  <script type="module" src="{{ admin_ui_path }}/static/admin.js"></script>
</body>
</html>
