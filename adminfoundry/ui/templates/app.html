<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ admin_title }}</title>
  <link rel="stylesheet" href="{{ admin_ui_path }}/static/admin.css">
</head>
<body
  data-view="{{ view }}"
  {% if resource %}data-resource="{{ resource }}"{% endif %}
  {% if record_id %}data-record-id="{{ record_id }}"{% endif %}
>
  <header class="topbar">
    <a class="brand" href="{{ admin_ui_path }}/dashboard">{{ admin_title }}</a>
    <nav class="topbar-nav" id="topbar-nav" aria-label="Resources"></nav>
    <button id="signout" type="button" class="btn btn-link">Sign out</button>
  </header>

  <main id="app-root" data-loading="true">
    <p class="placeholder">Loading…</p>
  </main>

  <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>

  <script>
    window.ADMINFOUNDRY = {
      uiPath: {{ admin_ui_path | tojson }},
      authPrefix: {{ auth_api_prefix | tojson }},
      adminPrefix: {{ admin_api_prefix | tojson }},
      view: {{ view | tojson }},
      resource: {{ resource | tojson }},
      recordId: {{ record_id | tojson }},
    };
  </script>
  <script type="module" src="{{ admin_ui_path }}/static/admin.js"></script>
</body>
</html>
