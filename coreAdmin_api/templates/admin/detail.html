{% extends "base.html" %}
{% block title %} — {{ model }} detail{% endblock %}

{% block content %}
<div class="page-header">
  <h1 id="page-title">{{ model }}</h1>
  <div style="display:flex;gap:.5rem">
    <a href="#" id="back-link" class="btn btn-secondary" aria-label="Back to {{ model }} list">← Back</a>
    <a href="#" id="edit-link" class="btn btn-primary" aria-label="Edit this {{ model }}">Edit</a>
  </div>
</div>
<div class="card">
  <div id="alert" class="alert" role="alert" aria-live="polite"></div>
  <section id="detail-body" aria-label="{{ model }} details" aria-live="polite"><p class="loading">Loading…</p></section>
</div>
{% endblock %}

{% block scripts %}
<script>
AdminUI.initDetail('{{ model }}', '{{ object_id }}');
</script>
{% endblock %}
